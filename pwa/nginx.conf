server {
    listen 80;

    # Serve PWA
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # Proxy API requests to rag-api container
    location /api/ {
        proxy_pass http://rag-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}