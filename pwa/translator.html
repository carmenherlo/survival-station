<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#2d5a27">
  <link rel="manifest" href="/manifest.json">
  <title>Translator — Survival Station</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      padding: 20px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #888;
      text-decoration: none;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    .back-btn:active { color: #f0f0f0; }

    h1 {
      text-align: center;
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #7bc67a;
    }

    .subtitle {
      text-align: center;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 32px;
    }

    .translator-section {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 16px;
    }

    .lang-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    select {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 10px;
      font-size: 0.9rem;
      appearance: none;
      text-align: center;
    }

    .swap-btn {
      background: none;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #7bc67a;
      font-size: 1.2rem;
      padding: 8px 12px;
      cursor: pointer;
      width: auto;
      margin-top: 0;
    }

    .swap-btn:active { background: #333; }

    textarea {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      color: #f0f0f0;
      padding: 10px;
      font-size: 0.9rem;
      resize: vertical;
      min-height: 100px;
    }

    .translate-btn {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      background: #2d5a27;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .translate-btn:active { background: #3a7a33; }
    .translate-btn:disabled { background: #444; cursor: wait; }

    .result-label {
      font-size: 0.8rem;
      color: #888;
      margin-top: 16px;
      margin-bottom: 6px;
    }

    .result {
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1.5;
      min-height: 60px;
      display: none;
      border-left: 3px solid #7bc67a;
    }

    .result.visible { display: block; }

    .error {
      border-left-color: #c67a7a;
      color: #c67a7a;
    }

    /* OCR section */
    .ocr-section {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 10px;
      background: #1f1f1f;
      border: 1px dashed #3a3a3a;
      border-radius: 8px;
    }

    .ocr-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #3a3a3a;
      color: #f0f0f0;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .ocr-btn:active { background: #4a4a4a; }
    .ocr-btn:disabled { opacity: 0.5; cursor: wait; }

    .ocr-lang-select {
      flex: 0 1 auto;
      width: auto;
      min-width: 110px;
      padding: 8px;
      font-size: 0.85rem;
    }

    .ocr-checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.8rem;
      color: #aaa;
      cursor: pointer;
    }

    .ocr-checkbox-label input {
      accent-color: #7bc67a;
    }

    .ocr-status {
      width: 100%;
      font-size: 0.8rem;
      color: #888;
      min-height: 1em;
    }

    .ocr-status.error { color: #c67a7a; }

    .ocr-preview {
      display: none;
      width: 100%;
      max-height: 180px;
      object-fit: contain;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #3a3a3a;
      background: #0f0f0f;
    }

    .ocr-preview.visible {
      display: block;
    }
  </style>
</head>
<body>

  <a class="back-btn" href="/">← Back</a>

  <h1>🌐 Translator</h1>
  <p class="subtitle">Offline translation — 9 languages</p>

  <div class="translator-section">

    <div class="lang-selector">
      <select id="sourceLang"></select>
      <button class="swap-btn" onclick="swapLangs()">⇄</button>
      <select id="targetLang"></select>
    </div>

    <!-- OCR: extract text from an image -->
    <div class="ocr-section">
      <label class="ocr-btn" for="ocrInput">
        📷 From image
      </label>
      <input
        type="file"
        id="ocrInput"
        accept="image/*"
        capture="environment"
        style="display:none"
      />
      <select id="ocrLang" class="ocr-lang-select">
        <option value="eng">English</option>
        <option value="spa">Spanish</option>
        <option value="deu">German</option>
      </select>
      <label class="ocr-checkbox-label">
        <input type="checkbox" id="ocrUseAsSource" checked>
        Use as source
      </label>
      <div class="ocr-status" id="ocrStatus"></div>
      <img id="ocrPreview" class="ocr-preview" alt="Uploaded image preview" />
    </div>

    <textarea id="inputText" placeholder="Enter text to translate..."></textarea>
    <button class="translate-btn" id="translateBtn" onclick="runTranslate()">Translate</button>

    <p class="result-label" id="resultLabel" style="display:none">Translation</p>
    <div class="result" id="result"></div>

  </div>

  <script src="/config.js"></script>
  <script>

    // OCR -> LibreTranslate language code mapping (matches backend)
    const OCR_TO_LT = { eng: 'en', spa: 'es', deu: 'de' };

    function swapLangs() {
      const src = document.getElementById('sourceLang');
      const tgt = document.getElementById('targetLang');
      const tmp = src.value;
      src.value = tgt.value;
      tgt.value = tmp;
    }

    async function runTranslate() {
      const text = document.getElementById('inputText').value.trim();
      if (!text) return;

      const source = document.getElementById('sourceLang').value;
      const target = document.getElementById('targetLang').value;

      if (source === target) {
        showResult('Source and target language are the same.', true);
        return;
      }

      const btn = document.getElementById('translateBtn');
      btn.disabled = true;
      btn.textContent = 'Translating...';

      try {
        const response = await fetch(`${CONFIG.TRANSLATOR_API}/translate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ q: text, source, target, format: 'text' })
        });
        const data = await response.json();
        showResult(data.translatedText);
      } catch (err) {
        showResult('Error connecting to the translator.', true);
      }

      btn.disabled = false;
      btn.textContent = 'Translate';
    }

    async function loadLanguages() {
      try {
        const response = await fetch(`${CONFIG.TRANSLATOR_API}/languages`);
        const languages = await response.json();

        const sourceSel = document.getElementById('sourceLang');
        const targetSel = document.getElementById('targetLang');

        languages.forEach(lang => {
          const name = lang.code === 'uk' ? 'Ukrainian' : lang.name;
          sourceSel.innerHTML += `<option value="${lang.code}">${name}</option>`;
          targetSel.innerHTML += `<option value="${lang.code}">${name}</option>`;
        });

        // Default: source=en, target=es
        sourceSel.value = 'en';
        targetSel.value = 'es';

      } catch (err) {
        console.error('Could not load languages:', err);
      }
    }

    // Load languages on page load
    loadLanguages();

    function showResult(text, isError = false) {
      const result = document.getElementById('result');
      const label = document.getElementById('resultLabel');
      result.textContent = text;
      result.className = 'result visible' + (isError ? ' error' : '');
      label.style.display = 'block';
    }

    // --- OCR ---
    function setOcrStatus(msg, isError = false) {
      const el = document.getElementById('ocrStatus');
      el.textContent = msg;
      el.className = 'ocr-status' + (isError ? ' error' : '');
    }

    async function handleImageUpload(file) {
      const ocrLang = document.getElementById('ocrLang').value;
      const useAsSource = document.getElementById('ocrUseAsSource').checked;
      const ocrBtn = document.querySelector('label[for="ocrInput"]');

      ocrBtn.style.pointerEvents = 'none';
      ocrBtn.style.opacity = '0.5';
      setOcrStatus('Extracting text…');

      // Show preview of the uploaded image
      const preview = document.getElementById('ocrPreview');
      preview.src = URL.createObjectURL(file);
      preview.classList.add('visible');
      
      try {
        const formData = new FormData();
        formData.append('file', file);

        const res = await fetch(`${CONFIG.RAG_API}/ocr?lang=${ocrLang}`, {
          method: 'POST',
          body: formData,
        });

        if (!res.ok) {
          const errData = await res.json().catch(() => ({}));
          throw new Error(errData.detail || `OCR failed (${res.status})`);
        }

        const data = await res.json();

        if (!data.text) {
          setOcrStatus('No text detected. Try another photo.', true);
          return;
        }

        // Fill the textarea
        document.getElementById('inputText').value = data.text;

        // Optionally align the translator's source language
        if (useAsSource) {
          const ltCode = OCR_TO_LT[ocrLang];
          const sourceSel = document.getElementById('sourceLang');
          if (ltCode && [...sourceSel.options].some(o => o.value === ltCode)) {
            sourceSel.value = ltCode;
          }
        }

        setOcrStatus(`Extracted ${data.char_count} chars. Translating…`);

        // Auto-translate
        await runTranslate();
        setOcrStatus(`Extracted ${data.char_count} chars.`);

      } catch (err) {
        setOcrStatus(err.message || 'OCR error.', true);
      } finally {
        ocrBtn.style.pointerEvents = '';
        ocrBtn.style.opacity = '';
        // Allow selecting the same file again
        document.getElementById('ocrInput').value = '';
      }
    }

    document.getElementById('ocrInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) handleImageUpload(file);
    });

  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>

</body>
</html>
