services:

  # LLM server - serves phi3:mini and nomic-embed-text
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # RAG API - FastAPI service with FAISS vector index
  rag-api:
    image: survival-station-rag:latest
    build: .
    container_name: rag-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://ollama:11434
      - LLM_MODEL=phi3:mini
      - EMBED_MODEL=nomic-embed-text
      - VECTOR_DIR=/data/vectorstore
    volumes:
      - ./data:/data        # vectorstore lives on host, not inside image
    depends_on:
      - ollama
    restart: unless-stopped

  # Offline maps server
  tileserver:
    image: maptiler/tileserver-gl
    container_name: tileserver
    ports:
      - "8080:8080"
    volumes:
      - ./data/maps:/data
    restart: unless-stopped

  # Offline wiki server
  kiwix:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix
    ports:
      - "8888:8888"
    volumes:
      - ./data/wiki:/data
    entrypoint: [ "sh", "-c", "kiwix-serve --port 8888 /data/*.zim" ]
    restart: unless-stopped

  # Offline translator - LibreTranslate with es/en/de models
  libretranslate:
      image: libretranslate/libretranslate:latest
      container_name: libretranslate
      user: root
      ports:
        - "5000:5000"
      environment:
        - LT_LOAD_ONLY=es,en,de,fr,uk,ru,it,ar,tr
        - LT_UPDATE_MODELS=false
        - LT_OFFLINE=true
      volumes:
        - ./data/translate:/home/libretranslate/.local/share/argos-translate
      restart: unless-stopped
    
  # PWA - served via nginx (HTTPS)
  pwa:
    image: nginx:alpine
    container_name: pwa
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./pwa:/usr/share/nginx/html
      - ./pwa/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./pwa/nginx-main.conf:/etc/nginx/nginx.conf
      - ./pwa/certs:/etc/nginx/certs:ro
    restart: unless-stopped

  # ===========================================================================
  # MONITORING STACK — dev profile only, not loaded in production
  # ===========================================================================

 
  # System metrics (CPU, RAM, disk, network)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    profiles: ["monitoring"]

  # Per-container Docker metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    profiles: ["monitoring"]

  # Metrics collection and storage
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "root"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    restart: unless-stopped
    profiles: ["monitoring"]

  # Visualization dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped
    profiles: ["monitoring"]

volumes:
  ollama_data:
  prometheus_data:
  grafana_data: